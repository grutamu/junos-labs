# VRRP Lab — JNCIS-ENT
# 2x vJunos-router (VRRP master/backup), 1x vJunos-switch (LAN), 1x Linux endpoint.
# Router interfaces are pre-configured. VRRP must be configured manually.
# The switch is pre-configured — all ports in VLAN 10 (transparent L2).
#
# Interface mapping: eth1=ge-0/0/0, eth2=ge-0/0/1
#
# Topology:
#
#   pc1 (192.168.1.100/24, gw: 192.168.1.1)
#    |
#   sw1 (VLAN 10 on all ports)
#    ├── ge-0/0/1 → r1 ge-0/0/0: 192.168.1.2/24  (VRRP master, priority 200)
#    └── ge-0/0/2 → r2 ge-0/0/0: 192.168.1.3/24  (VRRP backup, priority 100)
#
#   r1 ge-0/0/1 ─── r2 ge-0/0/1  (uplink: 10.0.12.0/30)
#
# VRRP:
#   Group 1 — VIP 192.168.1.1 (pc1 default gateway)
#   r1 priority 200 (master), r2 priority 100 (backup, default)
#
# Links:
#   pc1 eth1       — sw1 ge-0/0/0 (eth1)
#   sw1 ge-0/0/1 (eth2) — r1 ge-0/0/0 (eth1)
#   sw1 ge-0/0/2 (eth3) — r2 ge-0/0/0 (eth1)
#   r1  ge-0/0/1 (eth2) — r2 ge-0/0/1 (eth2)  uplink
#
# Lab guide: See Lab Docs/VRRP-Lab.md

name: vrrp-lab

topology:
  kinds:
    juniper_vjunosrouter:
      image: vrnetlab/juniper_vjunos-router:25.4R1.12
      env:
        QEMU_MEMORY: 4096
        QEMU_SMP: 2
    juniper_vjunosswitch:
      image: vrnetlab/juniper_vjunos-switch:25.4R1.12
      env:
        QEMU_MEMORY: 4096
        QEMU_SMP: 2

  nodes:
    r1:
      kind: juniper_vjunosrouter
      startup-config: configs/vrrp/r1.conf

    r2:
      kind: juniper_vjunosrouter
      startup-config: configs/vrrp/r2.conf

    sw1:
      kind: juniper_vjunosswitch
      startup-config: configs/vrrp/sw1.conf

    pc1:
      kind: linux
      image: alpine:latest
      exec:
        - ip addr add 192.168.1.100/24 dev eth1
        - ip route add default via 192.168.1.1

  links:
    - endpoints: ["pc1:eth1", "sw1:eth1"]   # pc1 — sw1 ge-0/0/0  (VLAN 10 access)
    - endpoints: ["sw1:eth2", "r1:eth1"]    # sw1 ge-0/0/1 — r1 ge-0/0/0  LAN 192.168.1.0/24
    - endpoints: ["sw1:eth3", "r2:eth1"]    # sw1 ge-0/0/2 — r2 ge-0/0/0  LAN 192.168.1.0/24
    - endpoints: ["r1:eth2", "r2:eth2"]     # r1 ge-0/0/1 — r2 ge-0/0/1   uplink 10.0.12.0/30
