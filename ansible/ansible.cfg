[defaults]
inventory = inventory.yml
host_key_checking = False
retry_files_enabled = False
stdout_callback = default
result_format = yaml
roles_path = roles

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o ServerAliveInterval=10 -o ServerAliveCountMax=6
# File transfers (e.g. the lab-file sync) occasionally die mid-stream with
# "Data could not be sent to remote host" on a flaky underlay path (seen on lab-01,
# a Tailscale link). It's transient — the same transfer succeeds on retry — so retry
# the connection a few times instead of failing the whole play.
retries = 3
# Use scp rather than the default 'smart' (which tries SFTP first); all methods work
# when the path is healthy, but scp avoids the SFTP-over-multiplexed-connection path.
transfer_method = scp
