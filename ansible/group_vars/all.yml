---
# Pinned versions
containerlab_version: "0.59.0"

vjunos_router_image: "vrnetlab/juniper_vjunos-router:25.4R1.12"
vjunos_switch_image: "vrnetlab/juniper_vjunos-switch:25.4R1.12"

# How vrnetlab images get on the host:
#   "registry" — docker pull (requires the images to exist in a registry; vJunos images do not)
#   "tarball"  — load *.tar files from vrnetlab_tarball_dir on the controller
#   "peer"     — copy images from another lab host that already has them built (see below)
vrnetlab_source: "peer"
# When vrnetlab_source == "tarball", path on the controller containing *.tar files
# vrnetlab_tarball_dir: "/path/to/vrnetlab/tars"
# When vrnetlab_source == "peer", inventory hostname of the host that already has the
# images loaded (built manually from the Juniper-supplied qcow2). That host is skipped;
# every other lab host has the images streamed from it over SSH and `docker load`ed.
vrnetlab_image_source_host: "lab-01"

# VXLAN underlay UDP port (containerlab default is 14789; the kernel default is 4789).
# We use 4789 to match the Linux/RFC default. Must match in all topology files.
vxlan_udp_port: 4789

# Underlay MTU on the NIC carrying VXLAN traffic.
# 1600 leaves room for the 50-byte VXLAN/UDP/IP overhead with default 1500 inner MTU.
# Bump to 9000 if your switch supports jumbo frames end-to-end.
underlay_mtu: 1600

# Mgmt CIDR allowed to SSH in via ufw. Tighten before applying.
mgmt_cidr: "0.0.0.0/0"

# Peer underlay IPs each host must accept VXLAN from. Computed in firewall role from inventory.

# Lab deployment configs — used by labs.yml
# Single-host labs: specify 'host', 'topo', 'configs_subdir'
# Multinode labs: specify 'hosts' dict mapping host → topology file
lab_configs:
  routing-lab:
    host: lab-01
    topo: routing-lab.clab.yml
    configs_subdir: routing
    remote_dir: /opt/labs/routing-lab

  layer2-lab:
    host: lab-01
    topo: layer2-lab.clab.yml
    configs_subdir: layer2
    remote_dir: /opt/labs/layer2-lab

  multinode-routing-lab:
    hosts:
      lab-01: host1.clab.yml
      lab-02: host2.clab.yml
    remote_dir: /opt/labs/multinode-routing-lab

  multinode-layer2-lab:
    hosts:
      lab-01: host1.clab.yml
      lab-02: host2.clab.yml
    remote_dir: /opt/labs/multinode-layer2-lab
