---
# Lab deployment manager
#
# Usage:
#   ansible-playbook labs.yml -e "lab=<name> op=<op>"
#
# Labs:    routing-lab  layer2-lab  multinode-routing-lab  multinode-ospf-lab
#          multinode-isis-lab  multinode-advanced-ospf-lab  multinode-layer2-lab
#          multinode-load-test  pe-lab
# Ops:     deploy  destroy  cleanup  save  inspect  restart

- name: Manage containerlab lab deployments
  hosts: lab_hosts
  gather_facts: false

  vars:
    lab: ""
    op: inspect

    _cfg: "{{ lab_configs[lab] }}"
    _multinode: "{{ 'hosts' in _cfg }}"
    _topo: >-
      {{ _cfg.hosts[inventory_hostname]
         if (_multinode | bool) and inventory_hostname in _cfg.get('hosts', {})
         else _cfg.get('topo', '')
         if not (_multinode | bool) and inventory_hostname == _cfg.get('host', '')
         else '' }}
    _active: "{{ _topo | length > 0 }}"
    _bridges: "{{ _cfg.get('pre_deploy_bridges', {}).get(inventory_hostname, []) }}"

  pre_tasks:
    - name: Validate inputs
      ansible.builtin.assert:
        that:
          - lab | length > 0
          - lab in lab_configs
          - op in ['deploy', 'destroy', 'cleanup', 'save', 'inspect', 'restart']
        fail_msg: |
          Usage: -e "lab=<name> op=<op>"
          Labs: {{ lab_configs.keys() | list | join('  ') }}
          Ops:  deploy  destroy  cleanup  save  inspect  restart
      run_once: true
      delegate_to: localhost

  tasks:
    # ── Destroy existing deployment first (deploy/restart) ───────────────────
    # Tear down before the file sync so the previous deployment's vJunos QEMU VMs
    # aren't pegging the host CPU during the transfer — on CPU-constrained hosts a
    # saturated box starves sshd and the sync dies with "Data could not be sent".
    # Guarded by a stat check so a first-ever deploy (no remote topology yet) is fine.

    - name: Check for existing remote topology
      ansible.builtin.stat:
        path: "{{ _cfg.remote_dir }}/{{ _topo }}"
      register: _remote_topo
      when: _active | bool and op in ['deploy', 'restart']

    - name: Destroy existing lab before sync
      ansible.builtin.shell:
        cmd: "containerlab destroy -t {{ _topo }} 2>&1"
        chdir: "{{ _cfg.remote_dir }}"
      register: _predestroy_out
      when: _active | bool and op in ['deploy', 'restart'] and _remote_topo.stat.exists | default(false)
      changed_when: "'no containerlab containers found' not in _predestroy_out.stdout"
      failed_when: _predestroy_out.rc != 0

    # ── File sync ──────────────────────────────────────────────────────────

    - name: Ensure remote lab directory exists
      ansible.builtin.file:
        path: "{{ _cfg.remote_dir }}"
        state: directory
        mode: "0755"
      when: _active | bool and op in ['deploy', 'restart']

    - name: Sync multinode lab files
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../multinode/{{ lab }}"
        dest: "{{ _cfg.remote_dir | dirname }}/"
        mode: preserve
      when: _active | bool and _multinode | bool and op in ['deploy', 'restart']

    - name: Sync single-node lab topology file
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../singlenode/{{ _cfg.topo }}"
        dest: "{{ _cfg.remote_dir }}/"
      when: _active | bool and not (_multinode | bool) and op in ['deploy', 'restart']

    - name: Sync single-node lab startup configs
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/../singlenode/configs/{{ _cfg.configs_subdir }}"
        dest: "{{ _cfg.remote_dir }}/configs/"
        mode: preserve
      when: _active | bool and not (_multinode | bool) and op in ['deploy', 'restart']

    # ── Destroy (op=destroy only; deploy/restart destroy up front, above) ─────

    - name: Destroy lab
      ansible.builtin.shell:
        cmd: "containerlab destroy -t {{ _topo }} 2>&1"
        chdir: "{{ _cfg.remote_dir }}"
      register: _destroy_out
      when: _active | bool and op == 'destroy'
      changed_when: "'no containerlab containers found' not in _destroy_out.stdout"
      failed_when: _destroy_out.rc != 0

    - name: Cleanup lab (destroy + remove runtime dir)
      ansible.builtin.shell:
        cmd: "containerlab destroy -t {{ _topo }} --cleanup 2>&1"
        chdir: "{{ _cfg.remote_dir }}"
      register: _cleanup_out
      when: _active | bool and op == 'cleanup'
      changed_when: "'no containerlab containers found' not in _cleanup_out.stdout"
      failed_when: _cleanup_out.rc != 0

    # ── Host bridges (for kind: bridge nodes) ─────────────────────────────

    - name: Ensure lab bridges exist on host
      ansible.builtin.shell:
        cmd: "ip link show {{ item }} >/dev/null 2>&1 || (ip link add name {{ item }} type bridge && ip link set {{ item }} up)"
      loop: "{{ _bridges }}"
      when: _active | bool and op in ['deploy', 'restart'] and _bridges | length > 0
      changed_when: false

    - name: Remove lab bridges from host
      ansible.builtin.shell:
        cmd: "ip link show {{ item }} >/dev/null 2>&1 && ip link delete {{ item }} || true"
      loop: "{{ _bridges }}"
      when: _active | bool and op == 'cleanup' and _bridges | length > 0
      changed_when: false

    # ── Deploy ────────────────────────────────────────────────────────────

    - name: Deploy lab
      ansible.builtin.shell:
        cmd: "containerlab deploy -t {{ _topo }} 2>&1"
        chdir: "{{ _cfg.remote_dir }}"
      register: _deploy_out
      when: _active | bool and op in ['deploy', 'restart']
      changed_when: true

    # ── Save configs ──────────────────────────────────────────────────────

    - name: Save node running configs
      ansible.builtin.shell:
        cmd: "containerlab save -t {{ _topo }} 2>&1"
        chdir: "{{ _cfg.remote_dir }}"
      register: _save_out
      when: _active | bool and op == 'save'
      changed_when: true

    - name: Show save output
      ansible.builtin.debug:
        msg: "{{ _save_out.stdout_lines }}"
      when: _active | bool and op == 'save'

    # ── Session manager output (deploy / restart / inspect) ───────────────

    - name: Get running lab info
      ansible.builtin.shell:
        cmd: >-
          containerlab inspect --name {{ lab }} --format json 2>/dev/null
          | grep -v '^time=' || echo '{"containers":[]}'
      register: _inspect_raw
      when: _active | bool and op not in ['destroy', 'cleanup']
      changed_when: false

    - name: Show session manager SSH entries
      vars:
        # containerlab <0.69 emits {"containers":[...]}; >=0.69 emits {"<lab-name>":[...]}.
        _containers: "{{ (_inspect_raw.stdout | from_json).containers | default((_inspect_raw.stdout | from_json)[lab] | default([])) }}"
        _proxy: "{{ hostvars[inventory_hostname].ansible_host }}"
      ansible.builtin.debug:
        msg: |
          ── {{ inventory_hostname }}  (ProxyJump: root@{{ _proxy }}) ──
          {% for c in _containers | sort(attribute='name') %}
          {{ '%-45s' | format(c.name) }}  ssh -J root@{{ _proxy }} admin@{{ c.ipv4_address | regex_replace('/.*', '') }}
          {% endfor %}
      when: >-
        _active | bool and op not in ['destroy', 'cleanup'] and
        _containers | length > 0
