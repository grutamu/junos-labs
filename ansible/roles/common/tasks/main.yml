---
- name: Install base packages
  ansible.builtin.apt:
    name:
      - bridge-utils
      - iproute2
      - python3
      - python3-apt
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Load required kernel modules on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/clab.conf
    mode: "0644"
    content: |
      vxlan
      br_netfilter

- name: Ensure modules are loaded now
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - vxlan
    - br_netfilter

- name: Apply containerlab sysctls
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-clab.conf
    mode: "0644"
    content: |
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 0
      net.bridge.bridge-nf-call-ip6tables = 0
  notify: Reload sysctl

- name: Set underlay NIC MTU
  ansible.builtin.command: "ip link set dev {{ underlay_iface }} mtu {{ underlay_mtu }}"
  changed_when: false
  when: underlay_iface is defined
