---
- name: Remove Ansible PPA files (no release for Ubuntu 25.10+)
  ansible.builtin.find:
    paths: /etc/apt/sources.list.d
    patterns: "ansible-ubuntu-ansible*"
  register: _ansible_ppa_files

- name: Delete Ansible PPA files
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ _ansible_ppa_files.files }}"

- name: Install base packages
  ansible.builtin.apt:
    name:
      - bridge-utils
      - iproute2
      - python3
      - python3-apt
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Load required kernel modules on boot
  ansible.builtin.copy:
    dest: /etc/modules-load.d/clab.conf
    mode: "0644"
    content: |
      vxlan
      br_netfilter

- name: Ensure modules are loaded now
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - vxlan
    - br_netfilter

- name: Apply containerlab sysctls
  ansible.builtin.copy:
    dest: /etc/sysctl.d/99-clab.conf
    mode: "0644"
    content: |
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-iptables = 0
      net.bridge.bridge-nf-call-ip6tables = 0
  notify: Reload sysctl

- name: Configure underlay NIC MTU via netplan
  ansible.builtin.copy:
    dest: /etc/netplan/99-underlay-mtu.yaml
    mode: "0600"
    content: |
      network:
        version: 2
        ethernets:
          {{ underlay_iface }}:
            mtu: {{ underlay_mtu }}
  when: underlay_iface is defined
  notify:
    - Apply netplan
    - Set MTU now
