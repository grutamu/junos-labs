# Troubleshooting Lab — OSPF
# 4x vJunos-router. Base addressing is pre-configured.
# OSPF has been deployed but is not functioning as intended.
# Find and fix all faults.
#
# Lab guide: See JNCIS-ENT/labs/Troubleshoot-OSPF.md

name: troubleshoot-ospf

topology:
  kinds:
    juniper_vjunosrouter:
      image: vrnetlab/juniper_vjunos-router:25.4R1.12

  nodes:
    r1:
      kind: juniper_vjunosrouter
      startup-config: configs/troubleshoot/ospf/r1.conf
    r2:
      kind: juniper_vjunosrouter
      startup-config: configs/troubleshoot/ospf/r2.conf
    r3:
      kind: juniper_vjunosrouter
      startup-config: configs/troubleshoot/ospf/r3.conf
    r4:
      kind: juniper_vjunosrouter
      startup-config: configs/troubleshoot/ospf/r4.conf

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r1:eth2", "r3:eth1"]
    - endpoints: ["r2:eth2", "r4:eth1"]
    - endpoints: ["r3:eth2", "r4:eth2"]
