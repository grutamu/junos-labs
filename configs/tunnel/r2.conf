system {
    host-name r2;
    services {
        ssh;
    }
}
interfaces {
    ge-0/0/0 {
        description "to-r1";
        unit 0 {
            family inet {
                address 10.0.12.2/30;
            }
        }
    }
    ge-0/0/1 {
        description "WAN-to-internet";
        unit 0 {
            family inet {
                address 192.0.2.1/30;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 10.0.0.2/32;
            }
        }
    }
}
routing-options {
    router-id 10.0.0.2;
    static {
        route 0.0.0.0/0 next-hop 192.0.2.2;
    }
}
