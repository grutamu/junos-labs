system {
    host-name r3;
    services {
        ssh;
    }
}
interfaces {
    ge-0/0/0 {
        description "to-r4";
        unit 0 {
            family inet {
                address 10.0.34.1/30;
            }
        }
    }
    ge-0/0/1 {
        description "WAN-to-internet";
        unit 0 {
            family inet {
                address 198.51.100.2/30;
            }
        }
    }
    lo0 {
        unit 0 {
            family inet {
                address 10.0.0.3/32;
            }
        }
    }
}
routing-options {
    router-id 10.0.0.3;
    static {
        route 0.0.0.0/0 next-hop 198.51.100.1;
    }
}
