system {
    host-name sw2;
    services {
        ssh;
    }
}
chassis {
    aggregated-devices {
        ethernet {
            device-count 1;
        }
    }
}
interfaces {
    ge-0/0/0 {
        ether-options {
            802.3ad ae0;
        }
    }
    ge-0/0/1 {
        ether-options {
            802.3ad ae0;
        }
    }
    ge-0/0/2 {
        unit 0 {
            family ethernet-switching {
                interface-mode trunk;
                vlan {
                    members [ VLAN10 VLAN20 VLAN30 ];
                }
            }
        }
    }
    ge-0/0/3 {
        unit 0 {
            family ethernet-switching {
                interface-mode access;
                vlan {
                    members VLAN10;
                }
            }
        }
    }
    ae0 {
        aggregated-ether-options {
            lacp {
                passive;
            }
        }
        unit 0 {
            family ethernet-switching {
                interface-mode trunk;
                vlan {
                    members [ VLAN10 VLAN20 VLAN30 ];
                }
            }
        }
    }
}
vlans {
    VLAN10 {
        vlan-id 10;
    }
    VLAN20 {
        vlan-id 20;
    }
    VLAN30 {
        vlan-id 30;
    }
}
protocols {
    rstp {
        bridge-priority 2048;
        interface ae0.0;
        interface ge-0/0/2.0;
    }
}
