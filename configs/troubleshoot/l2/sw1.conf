system {
    host-name sw1;
    services {
        ssh;
    }
}
chassis {
    aggregated-devices {
        ethernet {
            device-count 1;
        }
    }
}
interfaces {
    ge-0/0/0 {
        ether-options {
            802.3ad ae0;
        }
    }
    ge-0/0/1 {
        ether-options {
            802.3ad ae0;
        }
    }
    ge-0/0/2 {
        unit 0 {
            family ethernet-switching {
                interface-mode trunk;
                vlan {
                    members [ VLAN10 VLAN20 VLAN30 ];
                }
            }
        }
    }
    ge-0/0/3 {
        unit 0 {
            family ethernet-switching {
                interface-mode trunk;
                vlan {
                    members [ VLAN10 VLAN20 VLAN30 ];
                }
            }
        }
    }
    ae0 {
        aggregated-ether-options {
            lacp {
                passive;
            }
            minimum-links 1;
        }
        unit 0 {
            family ethernet-switching {
                interface-mode trunk;
                vlan {
                    members [ VLAN10 VLAN20 VLAN30 ];
                }
            }
        }
    }
    irb {
        unit 10 {
            family inet {
                address 192.168.10.1/24;
            }
        }
        unit 20 {
            family inet {
                address 192.168.20.1/24;
            }
        }
    }
}
vlans {
    VLAN10 {
        vlan-id 10;
        l3-interface irb.10;
    }
    VLAN20 {
        vlan-id 20;
        l3-interface irb.20;
    }
    VLAN30 {
        vlan-id 30;
    }
}
protocols {
    rstp {
        bridge-priority 4096;
        interface ge-0/0/2.0;
        interface ge-0/0/3.0;
        interface ae0.0;
    }
}
