name: multinode-routing-lab

topology:
  kinds:
    juniper_vjunosrouter:
      image: vrnetlab/juniper_vjunos-router:25.4R1.12

  nodes:
    cust-r2:
      kind: juniper_vjunosrouter
      startup-config: configs/cust-r2.conf
    pe3:
      kind: juniper_vjunosrouter
      startup-config: configs/pe3.conf
    pe4:
      kind: juniper_vjunosrouter
      startup-config: configs/pe4.conf
    pe5:
      kind: juniper_vjunosrouter
      startup-config: configs/pe5.conf

  links:
    # Local veth on host2
    - endpoints: ["pe3:eth2", "pe4:eth2"]
    - endpoints: ["pe4:eth1", "pe5:eth2"]
    - endpoints: ["pe5:eth3", "cust-r2:eth1"]

    # Cross-host to r5 on host1 (VNI 124)
    - type: vxlan-stitch
      endpoint:
        node: pe3
        interface: eth1
      remote: 192.168.1.45
      vni: 123
      udp-port: 4789

    # Cross-host to r1 on host1 (VNI 113)
    - type: vxlan-stitch
      endpoint:
        node: pe5
        interface: eth1
      remote: 192.168.1.45    # host1 underlay IP
      vni: 115
      udp-port: 4789