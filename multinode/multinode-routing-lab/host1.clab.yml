name: multinode-routing-lab

topology:
  kinds:
    juniper_vjunosrouter:
      image: vrnetlab/juniper_vjunos-router:25.4R1.12

  nodes:
    cust-r1:
      kind: juniper_vjunosrouter
      startup-config: configs/cust-r1.conf
    pe1:
      kind: juniper_vjunosrouter
      startup-config: configs/pe1.conf
    pe2:
      kind: juniper_vjunosrouter
      startup-config: configs/pe2.conf

  links:
    # Local veth on host1
    - endpoints: ["pe1:eth2", "pe2:eth1"]
    - endpoints: ["pe2:eth3", "cust-r1:eth1"]
    - endpoints: ["pe1:eth3", "cust-r1:eth2"]

    # Cross-host to r5 on host2 (VNI 124)
    - type: vxlan-stitch
      endpoint:
        node: pe2
        interface: eth2
      remote: 192.168.1.22
      vni: 123
      udp-port: 4789

    # Cross-host to r3 on host2 (VNI 113)
    - type: vxlan-stitch
      endpoint:
        node: pe1
        interface: eth1
      remote: 192.168.1.22    # host2 underlay IP
      vni: 115
      udp-port: 4789