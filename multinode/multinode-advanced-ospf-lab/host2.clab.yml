name: multinode-advanced-ospf-lab

topology:
  kinds:
    juniper_vjunosrouter:
      image: vrnetlab/juniper_vjunos-router:25.4R1.12

  nodes:
    r5:
      kind: juniper_vjunosrouter
      startup-config: configs/r5.conf
    r6:
      kind: juniper_vjunosrouter
      startup-config: configs/r6.conf
    r7:
      kind: juniper_vjunosrouter
      startup-config: configs/r7.conf

  links:
    - endpoints: ["r5:eth1", "r6:eth1"]
    - endpoints: ["r6:eth2", "r7:eth1"]

    - type: vxlan-stitch
      endpoint:
        node: r5
        interface: eth3
      remote: 192.168.1.45
      vni: 500
      udp-port: 4789
