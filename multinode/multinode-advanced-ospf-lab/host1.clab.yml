name: multinode-advanced-ospf-lab

topology:
  kinds:
    juniper_vjunosrouter:
      image: vrnetlab/juniper_vjunos-router:25.4R1.12

  nodes:
    r1:
      kind: juniper_vjunosrouter
      startup-config: configs/r1.conf
    r2:
      kind: juniper_vjunosrouter
      startup-config: configs/r2.conf
    r3:
      kind: juniper_vjunosrouter
      startup-config: configs/r3.conf
    r4:
      kind: juniper_vjunosrouter
      startup-config: configs/r4.conf

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]
    - endpoints: ["r1:eth2", "r3:eth1"]
    - endpoints: ["r1:eth3", "r4:eth1"]
    - endpoints: ["r2:eth2", "r3:eth2"]
    - endpoints: ["r2:eth3", "r4:eth2"]

    - type: vxlan-stitch
      endpoint:
        node: r4
        interface: eth3
      remote: 192.168.1.22
      vni: 500
      udp-port: 4789
