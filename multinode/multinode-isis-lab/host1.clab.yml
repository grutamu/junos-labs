name: multinode-isis-lab

topology:
  kinds:
    juniper_vjunosrouter:
      image: vrnetlab/juniper_vjunos-router:25.4R1.12

  nodes:
    r1:
      kind: juniper_vjunosrouter
      startup-config: configs/r1.conf
    r2:
      kind: juniper_vjunosrouter
      startup-config: configs/r2.conf
    r3:
      kind: juniper_vjunosrouter
      startup-config: configs/r3.conf
    r4:
      kind: juniper_vjunosrouter
      startup-config: configs/r4.conf
    sw:
      kind: bridge

  links:
    - endpoints: ["r1:eth1", "sw:port1"]
    - endpoints: ["r2:eth1", "sw:port2"]
    - endpoints: ["r3:eth1", "sw:port3"]
    - endpoints: ["r2:eth2", "r4:eth1"]

    - type: vxlan-stitch
      endpoint:
        node: r3
        interface: eth2
      remote: 192.168.1.22
      vni: 123
      udp-port: 4789
