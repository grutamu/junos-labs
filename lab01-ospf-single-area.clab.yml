# Lab 1 — OSPF Single Area
# 4x vJunos-router in a square topology
#
# Interface mapping: eth1=ge-0/0/0, eth2=ge-0/0/1, eth3=ge-0/0/2
#
# Addressing:
#   R1 lo0: 10.0.0.1/32   R2 lo0: 10.0.0.2/32
#   R3 lo0: 10.0.0.3/32   R4 lo0: 10.0.0.4/32
#
#   R1 ge-0/0/0 — R2 ge-0/0/0  : 10.0.12.1/30 — 10.0.12.2/30
#   R1 ge-0/0/1 — R3 ge-0/0/0  : 10.0.13.1/30 — 10.0.13.2/30
#   R2 ge-0/0/1 — R4 ge-0/0/0  : 10.0.24.1/30 — 10.0.24.2/30
#   R3 ge-0/0/1 — R4 ge-0/0/1  : 10.0.34.1/30 — 10.0.34.2/30

name: lab01-ospf-single-area

topology:
  kinds:
    juniper_vjunosrouter:
      image: vrnetlab/juniper_vjunos-router:25.4R1.12

  nodes:
    r1:
      kind: juniper_vjunosrouter
    r2:
      kind: juniper_vjunosrouter
    r3:
      kind: juniper_vjunosrouter
    r4:
      kind: juniper_vjunosrouter

  links:
    - endpoints: ["r1:eth1", "r2:eth1"]  # R1 ge-0/0/0 — R2 ge-0/0/0  10.0.12.0/30
    - endpoints: ["r1:eth2", "r3:eth1"]  # R1 ge-0/0/1 — R3 ge-0/0/0  10.0.13.0/30
    - endpoints: ["r2:eth2", "r4:eth1"]  # R2 ge-0/0/1 — R4 ge-0/0/0  10.0.24.0/30
    - endpoints: ["r3:eth2", "r4:eth2"]  # R3 ge-0/0/1 — R4 ge-0/0/1  10.0.34.0/30
